# codigoms-carrito
# Autor: Prof. Sting Parra Silva
#
# Microservicio de carrito. Su propia BD independiente.
# Cuando necesita datos de un libro llama a codigoms_catalogo
# por HTTP via FeignClient — no accede a su BD directamente.
# Crear BD "carrito_db" en phpMyAdmin antes de arrancar.

server.port=8083
spring.application.name=codigoms-carrito

spring.datasource.url=jdbc:mysql://localhost:3306/carrito_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# URL del microservicio de catalogo
catalogo.service.url=http://localhost:8082

feign.client.config.default.connect-timeout=3000
feign.client.config.default.read-timeout=5000
