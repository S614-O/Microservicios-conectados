# codigoms-catalogo
# Autor: Prof. Sting Parra Silva
#
# Microservicio de catalogo: gestiona Categorias y Libros.
# Los otros microservicios (carrito, pedidos) consultan este
# servicio por HTTP cuando necesitan informacion de un libro.
# Crear BD "catalogo_db" en phpMyAdmin antes de arrancar.

server.port=8082
spring.application.name=codigoms-catalogo

spring.datasource.url=jdbc:mysql://localhost:3306/catalogo_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
