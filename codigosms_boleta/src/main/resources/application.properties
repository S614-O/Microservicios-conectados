spring.application.name=codigosms_boleta
server.port=8089

spring.datasource.url=jdbc:mysql://localhost:3306/boletas_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# URL del microservicio de catalogo
catalogo.service.url=http://localhost:8089

feign.client.config.default.connect-timeout=3000
feign.client.config.default.read-timeout=5000
