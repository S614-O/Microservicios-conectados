spring.application.name=codigoms-favoritos

# Crear BD "favoritos_db" en phpMyAdmin antes de arrancar.

server.port=8085

spring.datasource.url=jdbc:mysql://localhost:3306/favoritos_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

catalogo.service.url=http://localhost:8082

feign.client.config.default.connect-timeout=3000
feign.client.config.default.read-timeout=5000
